name: mementovm-production

services:
  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_DB: memento
      POSTGRES_USER: memento
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U memento -d memento"]
      interval: 5s
      timeout: 3s
      retries: 30
    networks: [internal]

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql+psycopg://memento:${POSTGRES_PASSWORD}@postgres:5432/memento
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/healthz')"]
      interval: 10s
      timeout: 5s
      retries: 20
    networks: [internal]

  worker:
    build:
      context: .
      dockerfile: worker/Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql+psycopg://memento:${POSTGRES_PASSWORD}@postgres:5432/memento
    depends_on:
      backend:
        condition: service_healthy
    networks: [internal]

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: /api/backend
        API_BASE_URL: http://backend:8000
    restart: unless-stopped
    environment:
      API_BASE_URL: http://backend:8000
    depends_on:
      backend:
        condition: service_healthy
    networks: [internal]

  caddy:
    image: caddy:2.10-alpine
    restart: unless-stopped
    environment:
      PUBLIC_DOMAIN: ${PUBLIC_DOMAIN:-localhost}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deployment/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      - frontend
      - backend
    networks: [internal]

networks:
  internal:

volumes:
  postgres-data:
  caddy-data:
  caddy-config:
