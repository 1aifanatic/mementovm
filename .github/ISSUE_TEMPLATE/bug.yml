name: Bug report
description: Report reproducible runtime behavior
body:
  - type: textarea
    id: behavior
    attributes:
      label: Observed behavior
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: replay
    attributes:
      label: Redacted replay or reproduction
      description: Never include credentials or customer data.

